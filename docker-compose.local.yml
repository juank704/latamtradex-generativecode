# ============================================================
# Latamtradex - Orquestacion para ejecucion LOCAL
# ============================================================
# Uso:
#   docker compose -f docker-compose.local.yml up -d --build
# Acceso:
#   http://localhost:3000
#
# Construye la imagen a partir del Dockerfile y levanta la app.
# El esquema de la base SQLite se aplica automaticamente al
# arrancar (docker-entrypoint.sh -> prisma db push).
# ============================================================
# Proyecto Compose aislado (no choca con el branch main).
name: latamtradex-test

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: latamtradex-test:latest
    container_name: latamtradex-test-app
    restart: unless-stopped
    ports:
      - "7084:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      AUTH_SECRET: ${AUTH_SECRET:-secreto-local-de-desarrollo-32-bytes-minimo}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_replace_me}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_replace_me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - latamtradex-db:/app/data
      - latamtradex-uploads:/app/public/uploads
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # Servicio de PRUEBAS (perfil "tests"). No arranca por defecto.
  # Usa la etapa "builder" (Playwright + Chromium + Jest) y levanta
  # internamente su propio servidor con la base sembrada.
  #   Unitarias: docker compose -f docker-compose.local.yml --profile tests run --rm unit
  #   E2E:       docker compose -f docker-compose.local.yml --profile tests run --rm e2e
  # ----------------------------------------------------------
  unit:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: latamtradex-builder:latest
    profiles: ["tests"]
    command: npm run test:coverage

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: latamtradex-builder:latest
    profiles: ["tests"]
    # Por defecto levanta su propio servidor en localhost. Para apuntar a la URL
    # desplegada: añade  -e E2E_BASE_URL=https://latamtradex-actividad2.azucarsintactica.com/
    command: npm run e2e

  # ----------------------------------------------------------
  # Servicio de SEED (perfil "tools"). Carga los datos demo en la MISMA base
  # de datos que usa la app (volumen latamtradex-db), reutilizable tras "up".
  #   docker compose -f docker-compose.local.yml --profile tools run --rm seed
  # ----------------------------------------------------------
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: latamtradex-builder:latest
    profiles: ["tools"]
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
    volumes:
      - latamtradex-db:/app/data
    command: npx tsx prisma/seed.ts

volumes:
  latamtradex-db:
    driver: local
  latamtradex-uploads:
    driver: local
